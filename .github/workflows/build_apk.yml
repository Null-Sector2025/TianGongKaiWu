name: Build APK for 天工开物
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install .NET Android workloads
        run: dotnet workload install android

      - name: Setup Android SDK/NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;26.2.11394342"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.2.11394342" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd MauiUI
          dotnet restore
          dotnet publish -f net8.0-android -c Release -p:AndroidSdkDirectory=$ANDROID_HOME

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: MauiUI/bin/Release/net8.0-android/*-Signed.apk
          tag_name: build-${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
